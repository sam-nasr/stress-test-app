<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Load Tester App</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Load Tester</h1>
          <p>Run local k6 stress tests against an API endpoint.</p>
        </div>
        <a class="ghost-link" href="https://k6.io/docs/get-started/installation/" target="_blank" rel="noreferrer">Install k6</a>
      </header>

      <section class="layout">
        <form id="test-form" class="panel">
          <div class="section-title">Target</div>
          <label>
            Base URL
            <input id="baseUrl" name="baseUrl" type="url" placeholder="http://localhost:8080" required>
          </label>

          <div class="grid two">
            <label>
              Endpoint
              <input id="endpoint" name="endpoint" type="text" placeholder="/users?page=1&limit=10" required>
            </label>
            <label>
              Method
              <select id="method" name="method">
                <option>GET</option>
                <option>POST</option>
                <option>PUT</option>
                <option>DELETE</option>
              </select>
            </label>
          </div>

          <label>
            Endpoint presets
            <select id="preset">
              <option value="">Choose a preset</option>
              <option value="GET /">GET /</option>
              <option value="GET /auth/me">GET /auth/me</option>
              <option value="GET /users?page=1&limit=10">GET /users?page=1&amp;limit=10</option>
              <option value="POST /auth/register">POST /auth/register</option>
              <option value="POST /auth/login">POST /auth/login</option>
            </select>
          </label>

          <div class="section-title">Auth</div>
          <label class="check-row">
            <input id="authEnabled" name="authEnabled" type="checkbox">
            <span>Auth enabled</span>
          </label>

          <div class="grid two">
            <label>
              Login URL
              <input id="loginUrl" name="loginUrl" type="text" placeholder="/auth/login">
            </label>
            <label>
              Token JSON path
              <input id="tokenPath" name="tokenPath" type="text" value="data.token">
            </label>
          </div>

          <div class="grid two">
            <label>
              Email
              <input id="email" name="email" type="email" placeholder="s3@ss.com">
            </label>
            <label>
              Password
              <input id="password" name="password" type="password" placeholder="password">
            </label>
          </div>

          <div class="section-title">Load</div>
          <div class="grid four">
            <label>
              VUs
              <input id="vus" name="vus" type="number" min="1" value="10" required>
            </label>
            <label>
              Ramp up
              <input id="rampUp" name="rampUp" type="text" value="10s" required>
            </label>
            <label>
              Duration
              <input id="duration" name="duration" type="text" value="30s" required>
            </label>
            <label>
              Ramp down
              <input id="rampDown" name="rampDown" type="text" value="10s" required>
            </label>
          </div>

          <div class="grid two load-pacing">
            <label>
              Sleep Between Requests (seconds)
              <input id="sleep" name="sleep" type="number" min="0" step="0.1" value="1" required>
              <span class="help-text">0 = max stress (no delay), 1 = realistic traffic</span>
            </label>
            <label>
              Test mode presets
              <select id="modePreset">
                <option value="">Choose a mode</option>
                <option value="1">Realistic (sleep 1)</option>
                <option value="0.3">Moderate Load (sleep 0.3)</option>
                <option value="0">Stress Test (sleep 0)</option>
              </select>
            </label>
          </div>

          <div class="section-title">Payload</div>
          <label>
            Headers JSON
            <textarea id="headers" name="headers" rows="5">{}</textarea>
          </label>
          <label>
            Body JSON
            <textarea id="body" name="body" rows="7">{}</textarea>
          </label>

          <div class="actions">
            <button id="runButton" type="submit">Run Test</button>
            <span id="status" role="status"></span>
          </div>
        </form>

        <section class="panel output-panel">
          <div class="output-header">
            <div>
              <div class="section-title">Output</div>
              <p>k6 stdout and stderr appear here.</p>
            </div>
            <a id="reportLink" class="report-link hidden" href="#" target="_blank" rel="noreferrer">Open report</a>
          </div>
          <pre id="output">Ready.</pre>
        </section>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
